# ==========================
# Application Configurations
# ==========================
spring.application.name=portfoliowebsite
server.port=8081

# ==========================
# Actuator Management Endpoints
# ==========================
management.server.port=9090
management.endpoints.web.exposure.include=*
management.endpoint.health.show-details=always
management.endpoints.web.base-path=/actuator
management.info.env.enabled=true

# ==========================
# Graphite Metrics Export Engine
# ==========================
management.graphite.metrics.export.enabled=true
# Set to 'host.docker.internal' so your containerized app can 
# talk out to your local Graphite/Grafana monitoring stack cleanly
management.graphite.metrics.export.host=host.docker.internal
management.graphite.metrics.export.port=2003
management.graphite.metrics.export.protocol=plaintext
management.graphite.metrics.export.step=10s

# Metric Aggregation Tags
management.metrics.tags.application=portfoliowebsite